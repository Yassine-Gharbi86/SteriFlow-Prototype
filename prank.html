<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SteriFlow — Loading...</title>

  <!-- ── Three.js via importmap ── -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <style>
    /* ─── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ─── Psychedelic background ────────────────────────────── */
    @keyframes hueShift {
      0%   { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }
    @keyframes bgPulse {
      0%, 100% { background-position: 0% 50%; }
      50%       { background-position: 100% 50%; }
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
      background: linear-gradient(
        270deg,
        #ff0080, #ff8c00, #ffe100,
        #00ff88, #00cfff, #9b59ff, #ff0080
      );
      background-size: 400% 400%;
      animation: bgPulse 4s ease infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: none;
    }

    /* ─── Scanline overlay for extra chaos ─────────────────── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,.08) 3px,
        rgba(0,0,0,.08) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Custom cursor ─────────────────────────────────────── */
    #cursor {
      position: fixed;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,.9);
      box-shadow: 0 0 14px 6px rgba(255,255,255,.7);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
      transition: transform .05s;
    }

    /* ─── Title ─────────────────────────────────────────────── */
    @keyframes titleBounce {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50%       { transform: translateY(-10px) rotate(2deg); }
    }
    #title {
      position: relative;
      z-index: 10;
      color: #fff;
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      font-weight: 900;
      text-shadow:
        3px 3px 0 #000,
        -2px -2px 0 #ff0080,
        2px -2px 0 #00cfff;
      letter-spacing: .12em;
      animation: hueShift 3s linear infinite, titleBounce 1.4s ease-in-out infinite;
      margin-bottom: 10px;
      text-align: center;
      padding: 0 1rem;
    }

    /* ─── Three.js canvas wrapper ───────────────────────────── */
    #canvas-wrap {
      position: relative;
      z-index: 10;
      width: min(480px, 90vw);
      height: min(480px, 90vw);
      border-radius: 50%;
      overflow: hidden;
      box-shadow:
        0 0 0 6px rgba(255,255,255,.25),
        0 0 60px 20px rgba(255,255,255,.3);
      animation: hueShift 3s linear infinite;
    }
    #canvas-wrap canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    /* ─── Loading spinner (shown until model loads) ─────────── */
    #loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.45);
      color: #fff;
      font-size: 1.1rem;
      font-weight: bold;
      z-index: 20;
      border-radius: 50%;
      transition: opacity .5s;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }

    /* ─── Dodging button ────────────────────────────────────── */
    @keyframes btnWiggle {
      0%, 100% { transform: rotate(-3deg) scale(1); }
      50%       { transform: rotate(3deg) scale(1.06); }
    }
    #dodge-btn {
      position: fixed;          /* fixed so we can place it anywhere */
      z-index: 100;
      padding: .7em 2.2em;
      font-family: inherit;
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      font-weight: 900;
      color: #fff;
      background: linear-gradient(135deg, #ff0080, #ff8c00);
      border: 4px solid #fff;
      border-radius: 50px;
      cursor: none;
      box-shadow:
        0 0 20px rgba(255,0,128,.7),
        0 8px 30px rgba(0,0,0,.4);
      animation: btnWiggle 1s ease-in-out infinite;
      transition: left .18s cubic-bezier(.22,.61,.36,1),
                  top  .18s cubic-bezier(.22,.61,.36,1);
      white-space: nowrap;
      user-select: none;
      text-shadow: 1px 1px 4px rgba(0,0,0,.5);
    }

    /* ─── Escape label flash ────────────────────────────────── */
    @keyframes flashIn {
      0%   { opacity:0; transform:translateX(-50%) translateY(-6px) scale(.8); }
      30%  { opacity:1; transform:translateX(-50%) translateY(0)    scale(1);  }
      70%  { opacity:1; }
      100% { opacity:0; }
    }
    #escape-msg {
      position: fixed;
      z-index: 200;
      left: 50%;
      top: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.75);
      color: #ffe100;
      font-size: 1rem;
      font-weight: bold;
      padding: .4em 1.2em;
      border-radius: 30px;
      pointer-events: none;
      opacity: 0;
    }
    #escape-msg.flash { animation: flashIn .9s ease forwards; }

    /* ─── Stars decoration ──────────────────────────────────── */
    .star {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #fff;
      pointer-events: none;
      animation: starFloat linear infinite;
      opacity: .7;
    }
    @keyframes starFloat {
      from { transform: translateY(110vh) rotate(0deg); opacity:.8; }
      to   { transform: translateY(-10vh)  rotate(720deg); opacity:0; }
    }
  </style>
</head>
<body>

  <!-- Custom cursor -->
  <div id="cursor"></div>

  <!-- Title -->
  <div id="title">🐱7el el PAGE ya ALAA !! 🐱</div>

  <!-- 3-D canvas -->
  <div id="canvas-wrap">
    <div id="loader">La7tha... 🐾</div>
  </div>

  <!-- Dodging button (placed outside canvas-wrap so it can roam freely) -->
  <button id="dodge-btn">🔒 Access Page</button>

  <!-- Escape message -->
  <div id="escape-msg">Nope 😈</div>

  <!-- Audio — muted autoplay then instantly unmuted (browser-safe trick) -->
  <!--
    ⚠️  Change the src extension to match your actual file.
        Common: .mp3  .ogg  .wav  .m4a
  -->
  <audio id="bg-audio" loop preload="auto" autoplay muted>
    <source src="Assets/Bluekai.mp3" type="audio/mpeg" />
    <source src="Assets/Bluekai.ogg" type="audio/ogg" />
  </audio>

  <!-- ── Floating stars (generated by JS below) ── -->

  <!-- ════════════════════════════════════════════════════════
       MAIN SCRIPT  (ES Module so Three.js importmap works)
       ════════════════════════════════════════════════════════ -->
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    /* ── Audio — instant autoplay ──────────────────────────────
       Browsers allow muted autoplay unconditionally.
       We start the element muted (set in HTML), begin playback,
       then unmute after one frame — the sound fires immediately
       without requiring any user click.                          */
    const audio = document.getElementById('bg-audio');

    // Attempt 1: plain play (works when navigating from login page)
    audio.muted = false;
    audio.play().catch(() => {
      // Attempt 2: muted start → instant unmute trick
      audio.muted = true;
      audio.play().then(() => {
        audio.muted = false;
      }).catch(() => {
        // Last resort: first interaction
        document.addEventListener('pointerdown', () => {
          audio.muted = false;
          audio.play().catch(() => {});
        }, { once: true });
      });
    });

    /* ── Floating stars ──────────────────────────────────────── */
    for (let i = 0; i < 28; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.cssText = `
        left: ${Math.random() * 100}vw;
        bottom: -10px;
        animation-duration: ${3 + Math.random() * 6}s;
        animation-delay: ${Math.random() * 8}s;
        width: ${4 + Math.random() * 8}px;
        height: ${4 + Math.random() * 8}px;
        background: hsl(${Math.random()*360},100%,80%);
      `;
      document.body.appendChild(s);
    }

    /* ── Custom cursor follow ────────────────────────────────── */
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });

    /* ── Three.js scene ──────────────────────────────────────── */
    const wrap   = document.getElementById('canvas-wrap');
    const loader = document.getElementById('loader');
    const W = wrap.clientWidth;
    const H = wrap.clientHeight;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(W, H);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    wrap.appendChild(renderer.domElement);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, W / H, 0.1, 100);
    camera.position.set(0, 0.5, 5.5);

    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 1.6));
    const dir = new THREE.DirectionalLight(0xffffff, 2.5);
    dir.position.set(3, 5, 5);
    scene.add(dir);
    const rim = new THREE.DirectionalLight(0xff88ff, 1.2);
    rim.position.set(-4, 2, -3);
    scene.add(rim);

    let catModel = null;

    const gltfLoader = new GLTFLoader();
    gltfLoader.load(
      'Assets/oiiaioooooiai_cat.glb',

      (gltf) => {
        catModel = gltf.scene;

        // Auto-center & scale
        const box    = new THREE.Box3().setFromObject(catModel);
        const center = box.getCenter(new THREE.Vector3());
        const size   = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale  = 4.0 / maxDim;
        catModel.scale.setScalar(scale);
        catModel.position.sub(center.multiplyScalar(scale));

        scene.add(catModel);
        loader.classList.add('hidden');

        // Start animation loop only after model loads
        animate();
      },

      // Progress
      (xhr) => {
        if (xhr.total) {
          const pct = Math.round(xhr.loaded / xhr.total * 100);
          loader.textContent = `La7tha… ${pct}% 🐾`;
        }
      },

      // Error fallback — show a spinning cube so the page still works
      (err) => {
        console.warn('GLB load failed, using fallback cube', err);
        loader.textContent = '🐱 Meow';
        setTimeout(() => loader.classList.add('hidden'), 1200);

        const geo   = new THREE.BoxGeometry(1.4, 1.4, 1.4);
        const mat   = new THREE.MeshStandardMaterial({ color: 0xff69b4, roughness: .4 });
        catModel    = new THREE.Mesh(geo, mat);
        scene.add(catModel);
        animate();
      }
    );

    /* Animation loop */
    function animate () {
      requestAnimationFrame(animate);
      if (catModel) catModel.rotation.y += 0.018; // constant 360° spin
      renderer.render(scene, camera);
    }

    /* Resize */
    window.addEventListener('resize', () => {
      const nW = wrap.clientWidth, nH = wrap.clientHeight;
      camera.aspect = nW / nH;
      camera.updateProjectionMatrix();
      renderer.setSize(nW, nH);
    });


    /* ── Dodging button logic ────────────────────────────────── */
    const btn    = document.getElementById('dodge-btn');
    const msgEl  = document.getElementById('escape-msg');
    const MARGIN = 30;   // px gap from viewport edges
    const FLEE   = 160;  // px proximity that triggers flee

    let btnW, btnH;
    const messages = ['wejbed 😈','HAHAHAHAHAHA 🐱','o93ed hakeka 🏃','or9ed 😜','ti bara!!! 🚀','lééééé 🎭'];

    // Place button initially below the canvas
    function initialPlace () {
      btnW = btn.offsetWidth;
      btnH = btn.offsetHeight;
      btn.style.left = (window.innerWidth  / 2 - btnW / 2) + 'px';
      btn.style.top  = (window.innerHeight * .85 - btnH / 2) + 'px';
    }
    initialPlace();
    window.addEventListener('resize', initialPlace);

    function randomPos () {
      btnW = btn.offsetWidth;
      btnH = btn.offsetHeight;
      const maxX = window.innerWidth  - btnW  - MARGIN;
      const maxY = window.innerHeight - btnH  - MARGIN;
      return {
        x: MARGIN + Math.random() * maxX,
        y: MARGIN + Math.random() * maxY
      };
    }

    function flashMsg () {
      const msg = messages[Math.floor(Math.random() * messages.length)];
      msgEl.textContent = msg;
      msgEl.classList.remove('flash');
      // reflow to restart animation
      void msgEl.offsetWidth;
      msgEl.classList.add('flash');
    }

    let lastEscape = 0;
    document.addEventListener('mousemove', e => {
      const rect = btn.getBoundingClientRect();
      const bCX  = rect.left + rect.width  / 2;
      const bCY  = rect.top  + rect.height / 2;
      const dist = Math.hypot(e.clientX - bCX, e.clientY - bCY);

      if (dist < FLEE) {
        const now = Date.now();
        if (now - lastEscape > 180) {   // throttle so it doesn't spam
          lastEscape = now;
          const pos = randomPos();
          btn.style.left = pos.x + 'px';
          btn.style.top  = pos.y + 'px';
          flashMsg();
        }
      }
    });

    /* Touch support — same logic for mobile */
    document.addEventListener('touchmove', e => {
      const touch = e.touches[0];
      const rect  = btn.getBoundingClientRect();
      const bCX   = rect.left + rect.width  / 2;
      const bCY   = rect.top  + rect.height / 2;
      const dist  = Math.hypot(touch.clientX - bCX, touch.clientY - bCY);
      if (dist < FLEE + 60) {
        const pos = randomPos();
        btn.style.left = pos.x + 'px';
        btn.style.top  = pos.y + 'px';
        flashMsg();
      }
    }, { passive: true });

  </script>
</body>
</html>
